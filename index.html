<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foco Libre</title>
  <link rel="icon" type="image/svg+xml" href="foco-libre-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Foco Libre</h1>
    <p>concentración sin límite · descanso = foco ÷ 5</p>
  </header>

  <main class="card">

    <div class="mode-label" id="mode-label">listo para comenzar</div>

    <div class="ring-wrap">
      <svg id="ring-svg" viewBox="0 0 240 240" aria-hidden="true">
        <circle id="ring-track" cx="120" cy="120" r="110"/>
        <circle id="ring-bg-glow" cx="120" cy="120" r="110"/>
        <circle id="ring-fill" cx="120" cy="120" r="110"/>
      </svg>
      <div class="timer-inner">
        <div id="time-text">00:00</div>
        <div class="sub-row">
          <div class="dot" id="dot"></div>
          <span id="sub-txt">concentración libre</span>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn" id="btn-main">
        <i class="ti ti-player-play" id="btn-icon" aria-hidden="true"></i>
        <span id="btn-label">iniciar</span>
      </button>
      <button class="btn" id="btn-secondary" title="Reiniciar" aria-label="Reiniciar">
        <i class="ti ti-refresh" aria-hidden="true"></i>
      </button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="stat-sessions">0</div>
        <div class="stat-key">sesiones</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-focus">0:00</div>
        <div class="stat-key">foco total</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-break">0:00</div>
        <div class="stat-key">descanso</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="history-header">
      <span>historial</span>
      <button id="clear-btn" title="Borrar historial" aria-label="Borrar historial">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>

    <div class="history-list" id="history-list" role="list" aria-live="polite">
      <div class="empty" id="empty-hint">tus sesiones aparecerán aquí</div>
    </div>

  </main>

  <div id="notif-banner" role="alert" style="display:none">
    <i class="ti ti-bell" aria-hidden="true"></i>
    <span>activá las notificaciones para saber cuándo termina el descanso</span>
    <button id="notif-allow">activar</button>
    <button id="notif-dismiss" aria-label="Cerrar"><i class="ti ti-x" aria-hidden="true"></i></button>
  </div>

  <footer>
    <em>enfocate sin reloj · el descanso te espera</em>
  </footer>

  <script src="main.js"></script>

</body>
</html>
